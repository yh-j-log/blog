# 맨 윗줄의 baseURL을 아래와 같이 수정하세요.
baseURL = "https://yh-j-log.github.io/blog/"languageCode = "ko-kr"
title = "Security Study Log"
theme = "PaperMod"

# 이 두 줄이 디자인 파일을 강제로 연결해줍니다.
canonifyURLs = true
relativeURLs = false

[params]
    defaultTheme = "dark" # 디자인 확인하기 좋게 다크모드 고정

[params.profileMode]
    enabled = true
    title = "장양환"
    subtitle = "Cyber Security Learner"
    imageUrl = "https://github.com/yh-j-log.png"
    imageWidth = 120 # 거대한 고양이 사진 방지
    imageHeight = 120
[[params.profileMode.buttons]]
    name = "모든 글 보기"
    url = "posts"
[[params.profileMode.buttons]]
    name = "태그별 보기"
    url = "tags"
[[menu.main]]
    name = "Wargame"
    url = "posts"
    weight = 10

[[menu.main]]
    name = "Search"
    url = "search"
    weight = 20
[[menu.main]]
    name = "Categories"
    url = "categories"
    weight = 30